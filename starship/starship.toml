# ref : https://namileriblog.com/terminal/terminal_setting_starship/
# ref : https://tech-unlimited.com/color.html

format = """
$fill\n\
$os\
[‚ĚĪ ](fg:#7aa2f7 bold)\
$hostname\
$directory\
$git_branch\
$git_status\
$git_metrics\
$python\
$rust\
$cmd_duration\
\n$character\
"""
# right_format = """
# $fill\
# $battery\
# $time\
# \n$character\
# """

[os]
# format = "[$symbol](bold white)"
format = "[$symbol]($style)"
# style = 'fg:#F8F8F2 bg:#7aa2f7 bold white'
style = 'fg:#7aa2f7 bold'
disabled = false
[os.symbols]
Macos = "ÔĆā "  # nf-fa-apple
Ubuntu = "ÔĆõ " # nf-linux-ubuntu
Debian = "ÔĆÜ " # nf-linux-debian
Windows = "ůįć≤ "

[hostname]
ssh_only = true
style = 'fg:#FF79C6 bold'
ssh_symbol = 'ÔíĄ '
format = '[$ssh_symbol$hostname ]($style)'
disabled = false

[directory]
truncation_length = 100
truncation_symbol = 'ÔĀľ ' # nf-fa-folder_open
truncate_to_repo = false
home_symbol = 'ÔÄē ~' # nf-fa-home
style = 'fg:#FF79C6 bold'
read_only = ' ůįĆĺ ' # nf-md-lock
read_only_style = 'fg:#F872bE bold'
format = '[$path]($style)[$read_only]($read_only_style)'

[git_branch]
symbol = 'Ôāõ ÔĄ¶ ' # nf-fa-github_alt, nf-fa-code_fork
truncation_length = 4
truncation_symbol = ''
style = 'fg:#7aa2f7 bold'
format = '[ ‚ĚĪ $symbol$branch(:$remote_branch)]($style)' # nf-pl-left_soft_divider
# format = '[ ÓāĪ‚ĚĪ $symbol$branch(:$remote_branch)]($style)' # nf-pl-left_soft_divider

[git_status]
style = 'fg:#FFB86C bold'
conflicted = '='
ahead = '‚á°${count}'
behind = '‚á£${count}'
diverged = '‚áē'
up_to_date = '‚úď'
untracked = '?'
# stashed = '$'
modified = '!${count}'
renamed = '¬Ľ'
deleted = '‚úė'
format = '([\[$all_status$ahead_behind\]]($style))'

[git_metrics]
added_style = 'fg:#9ece6a bold'
deleted_style = 'fg:#9ece6a bold'
format = '[+$added/-$deleted]($deleted_style)'
disabled = false

[python]
symbol = 'ůįĆ† '
style = 'fg:#f1fa8c bold'
format = '[ ‚ĚĪ ${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[rust]
symbol = 'ůĪėó '
style = 'fg:#f1fa8c bold'
format = '[ ‚ĚĪ ${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[fill]
symbol = '‚ĒÄ'
style = 'fg:#505050 bold'

[character]
error_symbol = "[‚ĚĮ](bold #ff5555)"
success_symbol = "[‚ĚĮ](bold #50fa7b)"
vimcmd_symbol = "[‚Ěģ](bold #BD93F9)"

[cmd_duration]
min_time = 1_000
style = 'fg:#FFB86C bold'
disabled = false
format = "[ ‚ĚĪ Óéā $duration]($style)" # nf-pl-right_soft_divider, nf-mdi-clock
# format = "[ Óā≥‚Ěį Óéā $duration]($style)" # nf-pl-right_soft_divider, nf-mdi-clock

[battery]
# style = 'fg:#e0af68'
# style = "bold blue"
format = ' ‚Ěį [$symbol$percentage]($style)'
# format = ' Óā≥‚Ěį [$symbol$percentage]($style)'
[[battery.display]]
threshold = 100
style = "bold blue"

[time]
disabled = false
style = 'fg:#8BE9FD bold'
format = '[ ‚Ěį ÔÄó $time]($style)' # nf-pl-right_soft_divider, nf-fa-clock_o
# format = '[ Óā≥ ÔÄó $time]($style)' # nf-pl-right_soft_divider, nf-fa-clock_o
time_format = '%T'
utc_time_offset = '+9'
use_12hr = false

