# ref : https://namileriblog.com/terminal/terminal_setting_starship/
# ref : https://tech-unlimited.com/color.html

format = """
$fill\n\
$os\
[ŌØ▒ ](fg:#7aa2f7 bold)\
$hostname\
$directory\
$git_branch\
$git_status\
$git_metrics\
$python\
$rust\
$cmd_duration\
\n$character\
"""
# right_format = """
# $fill\
# $battery\
# $time\
# \n$character\
# """

[os]
# format = "[$symbol](bold white)"
format = "[$symbol]($style)"
# style = 'fg:#F8F8F2 bg:#7aa2f7 bold white'
style = 'fg:#7aa2f7 bold'
disabled = false
[os.symbols]
Macos = "’īé "  # nf-fa-apple
Ubuntu = "’īø " # nf-linux-ubuntu
Debian = "’īå " # nf-linux-debian
Windows = "¾░Ź▓ "

[hostname]
ssh_only = true
style = 'fg:#FF79C6 bold'
ssh_symbol = '’Æä '
format = '[$ssh_symbol$hostname ]($style)'
disabled = false

[directory]
truncation_length = 100
truncation_symbol = '’ü╝ ' # nf-fa-folder_open
truncate_to_repo = false
home_symbol = '’ĆĢ ~' # nf-fa-home
style = 'fg:#FF79C6 bold'
read_only = ' ¾░īŠ ' # nf-md-lock
read_only_style = 'fg:#F872bE bold'
format = '[$path]($style)[$read_only]($read_only_style)'

[git_branch]
symbol = '’éø ’ä” ' # nf-fa-github_alt, nf-fa-code_fork
truncation_length = 4
truncation_symbol = ''
style = 'fg:#7aa2f7 bold'
format = '[ ŌØ▒ $symbol$branch(:$remote_branch)]($style)' # nf-pl-left_soft_divider
# format = '[ Ņé▒ŌØ▒ $symbol$branch(:$remote_branch)]($style)' # nf-pl-left_soft_divider

[git_status]
style = 'fg:#FFB86C bold'
conflicted = '='
ahead = 'ŌćĪ${count}'
behind = 'ŌćŻ${count}'
diverged = 'ŌćĢ'
up_to_date = 'Ō£ō'
untracked = '?'
# stashed = '$'
modified = '!${count}'
renamed = '┬╗'
deleted = 'Ō£ś'
format = '([\[$all_status$ahead_behind\]]($style))'

[git_metrics]
added_style = 'fg:#9ece6a bold'
deleted_style = 'fg:#9ece6a bold'
format = '[+$added/-$deleted]($deleted_style)'
disabled = false

[python]
symbol = '¾░īĀ '
style = 'fg:#f1fa8c bold'
format = '[ ŌØ▒ ${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[rust]
symbol = '¾▒śŚ '
style = 'fg:#f1fa8c bold'
format = '[ ŌØ▒ ${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[fill]
symbol = 'ŌöĆ'
style = 'fg:#606060 bold'

[character]
error_symbol = "[ŌØ»](bold #ff5555)"
success_symbol = "[ŌØ»](bold #50fa7b)"

[cmd_duration]
min_time = 1_000
style = 'fg:#FFB86C bold'
disabled = false
format = "[ ŌØ▒ ŅÄé $duration]($style)" # nf-pl-right_soft_divider, nf-mdi-clock
# format = "[ Ņé│ŌØ░ ŅÄé $duration]($style)" # nf-pl-right_soft_divider, nf-mdi-clock

[battery]
# style = 'fg:#e0af68'
# style = "bold blue"
format = ' ŌØ░ [$symbol$percentage]($style)'
# format = ' Ņé│ŌØ░ [$symbol$percentage]($style)'
[[battery.display]]
threshold = 100
style = "bold blue"

[time]
disabled = false
style = 'fg:#8BE9FD bold'
format = '[ ŌØ░ ’ĆŚ $time]($style)' # nf-pl-right_soft_divider, nf-fa-clock_o
# format = '[ Ņé│ ’ĆŚ $time]($style)' # nf-pl-right_soft_divider, nf-fa-clock_o
time_format = '%T'
utc_time_offset = '+9'
use_12hr = false

