# unbind C-b
# set -g prefix C-\'
# set -g prefix C-u
set -g prefix C-\;

set -sa terminal-overrides ',*:Smulx=\E[4::%p1%dm'
##### Enable Shift+Enter #####
set -as terminal-features ',*:extkeys'

# vimй«ҳйҖҹеҢ–пјҹ
set -s escape-time 1
##### Enable Shift+Enter #####
set -s extended-keys always
set -s extended-keys-format csi-u
set -s user-keys[0] "\e[13;2u"
bind-key -n User0 send-keys Escape "[13;2u"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# settings for Yazi in Tmux
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set-option -g mouse on
set-option -g pane-border-lines double

# Split Window
bind s split-window -h -c '#{pane_current_path}'
bind v split-window -v -c '#{pane_current_path}'
bind S split-window -h \; select-layout even-horizontal
bind V split-window -v \; select-layout even-vertical

# vi keybind
set-window-option -g mode-keys vi
unbind i
bind i copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle

# иЁӯе®ҡгғ•гӮЎгӮӨгғ«гӮ’гғӘгғӯгғјгғү
bind-key -T prefix r source-file ~/.config/tmux/tmux.conf \; display-message 'Reloaded!'

# Keybind: Pane
unbind n
unbind x
unbind \;
bind h select-pane -L
bind l select-pane -R
bind j select-pane -D
bind k select-pane -U
bind n select-pane -t :.+
bind b select-pane -t :.-
bind x kill-pane
# nvim-tmux-navigation #
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(n?vim|vim)'"

bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

## Resize the Pane
#### -r = this key may repeat
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Keybind: Window
unbind X
bind f select-window -t :+
bind b select-window -t :-
bind L select-window -t :+
bind H select-window -t :-
bind X kill-window

# Customize

# Dracula Style
background="#282A36"
currentLine=#6272A4
selection="#44475A"
foreground="#F8F8F2"
comment=#"6272A4"
red="#FF5555"
orange="#FFB86C"
dyellow="#F1FA8C"
green="#50FA7B"
cyan="#8BE9FD"
dpurple="#BD93F9"
pink="#FF79C6"

set-option -g status-fg ${foreground}
set-option -g status-bg "#44525A"
set-option -g status-interval 3
set-option -g status-position bottom
set-option -g status-left-length 50
set-option -g status-right-length 100
set-option -gw window-status-separator " "
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#282A36,bg=yellow,bold'
set -g @prefix_highlight_fg ${background}
set -g @prefix_highlight_bg ${dpurple}
set -g @prefix_highlight_empty_has_affixes 'on'
set -g @prefix_highlight_empty_prompt 'оһ• #S'
set -g @prefix_highlight_output_suffix ' '
set -g window-status-current-format "#[fg=${dpurple},bold] п‘„ #[underscore]#I:#W"
set -g window-status-format " #I:#W"
set -g set-clipboard on
# оһ• оӘ… п’ү
# set -g status-left "#{prefix_highlight} оҜҲ #(tmux show-options -g prefix | awk '{print $2}')"
# set -g status-left "#{prefix_highlight} оҜҲ C-\;"
set -g status-left "#{prefix_highlight} оҜҲ #{prefix}"
# set -g status-right "#[fg=${foreground},bold] у°Қӣ #{cpu} | у°ҳҡ #{mem} | #(LC_TIME=C date +'%_m/%d %H:%M') "
# set -g status-right "#[fg=${foreground},bold] у°Қӣ #{cpu} | у°ҳҡ #{mem} | #(date +'%u' | awk '{split(\"Mon Tue Wed Thu Fri Sat Sun\", d); print d[$1]}')$date %h/%d %H:%M  "
if-shell "uname | grep -q Darwin" {
  set -g status-right "#[fg=${foreground},bold] у°Қӣ #{cpu_percentage} | у°ҳҡ #{ram_percentage} | #(~/.config/tmux/scripts/day.sh) %_m/%d %H:%M"
  # set -g status-right "CPU: #{cpu_percentage} | RAM: #{ram_percentage} | #(date +'%u' | awk '{split(\"Mon Tue Wed Thu Fri Sat Sun\", d); print d[\$1]}') $date%m/%d %H:%M"
} {
  set -g status-right "#[fg=${foreground},bold] у°Қӣ #(top -bn1 | grep 'Cpu(s)' | awk '{print 100 - \$8\"%\"}') | у°ҳҡ #(free | awk '/Mem:/ {printf \"%.0f%%\", \$3/\$2 * 100.0}') | #(~/.config/tmux/scripts/day.sh) %_m/%d %H:%M "
}

### tpm ###
setenv -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins/"
# mkdir -p ~/.config/tmux/plugins/tpm/
# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
# prefix + I

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jtbairdsr/tmux-inactive-panes'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank' # Prefix + [ -> ctrl + v -> Space
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
# set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'jaclu/tmux-menus'

set -g @menus_trigger 'Space' # prefix+space

# Macз”Ё
if-shell "uname | grep -q Darwin" {
  set -g @plugin 'tmux-plugins/tmux-cpu'
}
# [Memo] edit "~/.tmux/plugins/tmux/scripts/dracula.sh" L53

# TPM гӮўгғігӮӨгғігӮ№гғҲгғјгғ«гӮ’ Prefix + R гҒ«еӨүжӣҙпјҲMac гҒ§M-uеҠ№гҒӢгҒӘгҒ„пјү
unbind-key R
bind R run '~/.config/tmux/plugins/tpm/bin/clean_plugins'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
